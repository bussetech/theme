{%- comment -%}
  map-head — vendored Leaflet stylesheets, emitted in <head> only on pages
  that opt in with `map: true` front-matter. Vendored + pinned (ADR-0027);
  never a CDN. Table-only pages load none of this.
{%- endcomment -%}
{%- if page.map -%}
<link rel="stylesheet" href="{{ '/assets/vendor/leaflet/leaflet.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/vendor/leaflet/MarkerCluster.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/vendor/leaflet/MarkerCluster.Default.css' | relative_url }}">
{%- endif -%}
