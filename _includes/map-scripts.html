{%- comment -%}
  map-scripts — vendored Leaflet + markercluster + the theme map behaviour,
  emitted before </body> only when `map: true`. Progressive enhancement: if
  these fail to load the page's tables remain the baseline (ADR-0027).
{%- endcomment -%}
{%- if page.map -%}
<script src="{{ '/assets/vendor/leaflet/leaflet.js' | relative_url }}"></script>
<script src="{{ '/assets/vendor/leaflet/leaflet.markercluster.js' | relative_url }}"></script>
<script src="{{ '/assets/js/map.js' | relative_url }}" defer></script>
{%- endif -%}
