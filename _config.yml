# _config.yml — builds the theme's OWN demo/documentation site (the visual
# regression surface for prompt 06). This config is NOT shipped to consumers:
# remote_theme propagates only _layouts/_includes/_sass/assets. The `studio:`
# block here is exactly the shape a consuming site provides (the factory,
# prompt 08, injects it from platform.yml).

title: Studio Theme
description: The shared design system every site in the studio uses — one theme, consumed as a remote_theme.
lang: en

# For the demo build. A published studio site sets its own site URL.
url: "https://example.com"
baseurl: ""

# The studio contract the theme reads. Org/domain/branding come from here,
# never hardcoded in theme source.
studio:
  logotype: "bussetech | software studio"
  org: bussetech
  domain: bussetech.com
  visibility: public        # public | private | private-published
  is_portal: false          # the demo shows the "a … project" attribution
  theme_color: "#FFFFFF"    # mobile browser-chrome hint (== token color.ground)
  analytics_beacon: ""      # empty → no beacon rendered (see _includes/analytics.html)
  # Email-signup capture (see _includes/signup.html). Off unless `enabled` +
  # `action` are set; the demo turns it on so the /components/ visual-regression
  # surface renders it. A consuming site injects its own provider action and
  # privacy note (the note MUST name Eszett, LLC per platform ADR-0034).
  signup:
    enabled: true
    action: "https://buttondown.com/api/emails/embed-subscribe/example"
    email_field: email
    heading: "Get studio updates"
    value_prop: "One human, a workforce of gnomes, every run receipted. Occasional notes on what the studio shipped — no spam, no tracking."
    button_label: "Subscribe"
    privacy_note: "We store only your email, to send these updates, under the Eszett, LLC privacy notice. Double opt-in; unsubscribe any time."
    hidden:
      embed: "1"
    placement_field: "metadata__placement"
    rail: true                       # demo shows the optional right rail
    rail_placement: "demo-rail"
  # Legal identity a consuming site injects from platform.yml branding.legal
  # (the factory fills studio.legal.copyright). Shown here so the demo renders
  # the footer copyright line — the visual-regression surface for the release.
  legal:
    copyright: "© 2026 Eszett, LLC"
  footer_note: "Theme (unreleased) · MIT"
  nav:
    - title: Home
      url: /
    - title: Components
      url: /components/
    - title: Maps
      url: /maps/
    - title: Wayfinding
      url: /wayfinding/
    - title: Design
      url: /design/

# Build settings
markdown: kramdown
permalink: /blog/:title/
sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md
  - LICENSE
  - scripts/
  - tokens/
  - vendor/
  - .github/
