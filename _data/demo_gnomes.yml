# Demo data for the components page — not shipped to consumers.
# igotchi blocks are invented demo values in the platform igotchi.json card
# shape (glyph, stage, score_display, traits, bio) — platform ADR-0036.
- display_name: Gnome DNS Steward
  var: gn_dns_steward
  level: platform
  status: ok
  status_label: idle
  home: platform
  purpose: Reconcile the studio's DNS zone and flag anything it doesn't own.
  deployments: [platform]
  igotchi:
    glyph: "◑"
    stage: journeyman
    score_display: 178k
    traits: [steady, thrifty, clockwork]
    bio: >-
      In the studio since 2026-01-05, Gnome DNS Steward has logged 48 runs and 178k
      tokens as a journeyman of the fleet. It has never once erred in the
      journal; its biggest week burned 40k tokens.
