name: ci

# The theme is the first real caller of the studio's reusable site CI
# (EPIC1-06): the standardized build → link-check → HTML-validate →
# discoverability → artifact pipeline lives in platform and is shared by every
# site repo. Theme-SPECIFIC checks (WCAG-AA palette, token-stylesheet
# freshness) stay here — they guard the design system, not a generic site.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Design-system-specific gates (fast, no Ruby).
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5.3.0
        with:
          python-version: "3.12"
      - name: Validate palette (WCAG AA) and token freshness
        run: |
          python -m pip install --quiet 'pyyaml>=6,<7'
          python scripts/check_contrast.py
          python scripts/build_tokens.py --check

  # Standardized site CI via the shared reusable workflow. The `if` guard makes
  # a detached copy of this repo (outside the org) skip the call and stay green.
  site:
    if: ${{ github.repository_owner == 'bussetech' }}
    uses: bussetech/platform/.github/workflows/reusable-site-ci.yml@v1
    with:
      visibility: public
      artifact_name: demo-site
