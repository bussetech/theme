name: ci

# The theme is a first real caller of the studio's shared site CI, which lives
# in the public `bussetech/ci` repo (a public repo can't call a private repo's
# reusable workflow — platform ADR-0011). Site build/link/HTML/discoverability/
# artifact come from the shared workflow; theme-SPECIFIC checks (WCAG-AA palette,
# token-stylesheet freshness) stay here — they guard the design system.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Design-system-specific gates (fast, no Ruby).
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5.3.0
        with:
          python-version: "3.12"
      - name: Validate palette (WCAG AA) and token freshness
        run: |
          python -m pip install --quiet 'pyyaml>=6,<7'
          python scripts/check_contrast.py
          python scripts/build_tokens.py --check

  # Standardized site CI via the shared reusable workflow. The `if` guard makes
  # a detached copy of this repo (outside the org) skip the call and stay green.
  site:
    if: ${{ github.repository_owner == 'bussetech' }}
    uses: bussetech/ci/.github/workflows/reusable-site-ci.yml@v1
    with:
      visibility: public
      artifact_name: demo-site
