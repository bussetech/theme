---
layout: default
---
{% include breadcrumb.html %}
<article class="prose">
  <header class="page-header">
    <h1 class="page-header__title">{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {%- if page.author %} · {{ page.author }}{% endif -%}
    </p>
  </header>
  {{ content }}
</article>
